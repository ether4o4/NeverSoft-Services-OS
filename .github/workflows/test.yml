name: Unit Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      github.actor != 'github-actions[bot]'

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref }}

      - name: Check if fork PR
        id: fork-check
        if: github.event_name == 'pull_request'
        run: |
          if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "is_fork=true" >> $GITHUB_OUTPUT
          else
            echo "is_fork=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set execution flag for gradlew
        run: chmod +x gradlew

      - name: Verify Java version
        run: |
          echo "JAVA_HOME: $JAVA_HOME"
          java -version

      - name: Run spotlessApply
        run: ./gradlew spotlessApply --no-daemon --stacktrace

      - name: Run updateScreenshots
        run: ./gradlew :screenshotTests:updateScreenshots --no-daemon --stacktrace

      - name: Install cwebp
        run: sudo apt-get update && sudo apt-get install -y webp

      - name: Convert site images to WebP
        run: ./scripts/convert-site-images-to-webp.sh

      - name: Run desktop tests
        run: ./gradlew :composeApp:desktopTest --no-daemon --stacktrace

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Fail if fork PR has changes
        if: |
          steps.changes.outputs.has_changes == 'true' &&
          steps.fork-check.outputs.is_fork == 'true'
        run: |
          echo "::error::This PR from a fork requires formatting or screenshot updates."
          echo "Please run the following commands locally and push the changes:"
          echo "  ./gradlew spotlessApply"
          echo "  ./gradlew :screenshotTests:updateScreenshots"
          echo "  ./scripts/convert-site-images-to-webp.sh"
          exit 1

      - name: Commit and push changes
        if: |
          steps.changes.outputs.has_changes == 'true' &&
          (github.event_name == 'push' || steps.fork-check.outputs.is_fork == 'false')
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "Auto-fix: spotlessApply and updateScreenshots [skip ci]"
          # Best-effort push. This step is a convenience that lands formatting/screenshot
          # fixes automatically — it is NOT a pass/fail gate (desktopTest above is). When the
          # repository's default Actions token is read-only (Settings -> Actions -> General ->
          # Workflow permissions), the push is rejected with a 403 even though the job declares
          # `contents: write`, which previously failed every PR here. Warn instead of failing.
          # To actually land auto-fixes, set Workflow permissions to "Read and write", or run
          # `./gradlew spotlessApply :screenshotTests:updateScreenshots` locally and push.
          if ! git push; then
            echo "::warning::Auto-fix changes were computed but could not be pushed (read-only Actions token). See the note in .github/workflows/test.yml."
          fi
