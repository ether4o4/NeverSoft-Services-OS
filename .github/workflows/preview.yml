name: Preview APK

# Builds a sideloadable Android preview for every pull request so reviewers can
# install the change on a device. Pushes to any branch and manual dispatches
# publish a dated GitHub pre-release and update the rolling
# `android-preview-latest` pre-release so testers see a fresh Releases entry
# plus one stable direct APK URL instead of relying only on short-lived Actions
# artifacts.
#
# Uses the `fossDebug` variant: the open-source (`foss`) flavor and the `debug`
# build type, signed with the shared debug keystore committed to the repo. That
# means no signing secrets are required. Because the keystore is stable, each
# preview installs in-place over a previous debug/preview build without wiping
# app data.

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional primary pre-release tag. Defaults to android-preview-YYYY-MM-DD; android-preview-latest is updated too.
        required: false
        type: string

permissions:
  contents: write

# A newer push to the same PR cancels an in-progress preview build for it.
concurrency:
  group: preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PREVIEW_APK_NAME: MorsVitaEst-android-preview.apk

jobs:
  preview-apk:
    name: Build foss debug APK
    runs-on: ubuntu-latest
    # The Unit Tests workflow pushes auto-fix commits back to PR branches; don't
    # rebuild a preview for those bot commits.
    if: github.actor != 'github-actions[bot]'
    # Where preview releases are published. Defaults to this repo; set the repo
    # variable RELEASES_REPO (+ the RELEASES_REPO_TOKEN secret) to publish the
    # downloadable APK to a separate public repo while this one stays private.
    env:
      RELEASES_REPO: ${{ vars.RELEASES_REPO || github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Mirror the release workflow's APK environment. The androidApp module pins
      # ndkVersion 29.0.14206865 and ships native libraries under src/main/jniLibs
      # (proot/talloc) with useLegacyPackaging, so every assemble — debug included —
      # runs stripDebugSymbols and needs that NDK. AGP auto-provisions it via the
      # SDK manager (licenses are accepted by setup-android), exactly as the proven
      # release build does; keep this SDK setup intact so stripping can find its tools.
      - name: Install Android build tools
        run: |
          sdkmanager "build-tools;36.0.0"
          sdkmanager "build-tools;29.0.3"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set execution flag for gradlew
        run: chmod +x gradlew

      # Make every preview APK have a strictly-greater versionCode than the
      # last one, so Android treats sideloaded preview-over-preview installs as
      # a real update. The static 105 in libs.versions.toml is the floor for
      # local/release builds; GITHUB_RUN_NUMBER (monotonic, per-workflow) is
      # added on top for CI builds only. Not committed back to the repo.
      - name: Bump preview versionCode (unique per CI run)
        run: |
          set -euo pipefail
          BASE=$(grep '^android-versionCode' gradle/libs.versions.toml | sed -E 's/.*"([^"]+)".*/\1/')
          NEW=$((BASE + GITHUB_RUN_NUMBER))
          sed -i "s/^android-versionCode = .*/android-versionCode = \"$NEW\"/" gradle/libs.versions.toml
          echo "preview versionCode: $BASE -> $NEW (run #$GITHUB_RUN_NUMBER)"

      - name: Build foss debug APK
        run: bash ./gradlew :androidApp:assembleFossDebug --stacktrace

      - name: Prepare preview APK
        id: preview
        env:
          REQUESTED_RELEASE_TAG: ${{ github.event.inputs.release_tag || '' }}
        run: |
          set -euo pipefail

          mkdir -p preview-output
          APK_PATH="$(find androidApp/build/outputs/apk/foss/debug -type f -name '*.apk' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No APK found under androidApp/build/outputs/apk/foss/debug" >&2
            exit 1
          fi

          cp "$APK_PATH" "preview-output/${PREVIEW_APK_NAME}"
          sha256sum "preview-output/${PREVIEW_APK_NAME}" | tee preview-output/sha256.txt

          PREVIEW_DATE="$(date -u +%Y-%m-%d)"
          REF_SLUG="$(printf '%s' "${GITHUB_REF_NAME:-manual}" | tr '/[:upper:]' '-[:lower:]' | tr -cd 'a-z0-9._-')"
          REF_SLUG="${REF_SLUG:-manual}"
          if [ -n "$REQUESTED_RELEASE_TAG" ]; then
            PREVIEW_TAG="$REQUESTED_RELEASE_TAG"
          else
            PREVIEW_TAG="android-preview-${PREVIEW_DATE}"
          fi
          LATEST_TAG="android-preview-latest"

          echo "tag=${PREVIEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          echo "date=${PREVIEW_DATE}" >> "$GITHUB_OUTPUT"
          echo "ref_slug=${REF_SLUG}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: morsvitaest-foss-debug-${{ github.event.pull_request.number || github.sha }}
          path: preview-output/${{ env.PREVIEW_APK_NAME }}
          if-no-files-found: error
          retention-days: 14

      - name: Write pre-release notes
        if: github.event_name != 'pull_request'
        run: |
          APK_SHA="$(cut -d ' ' -f1 preview-output/sha256.txt)"
          cat > preview-output/release-notes.md << EOF
          Android preview APK built from \`${GITHUB_SHA}\` on \`${GITHUB_REF_NAME}\`.

          - Variant: \`fossDebug\`
          - Signed with the repo's shared debug keystore, so it installs over prior debug/preview builds without wiping app data.
          - APK SHA-256: \`${APK_SHA}\`
          - Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          - Direct download: ${GITHUB_SERVER_URL}/${RELEASES_REPO}/releases/download/${{ steps.preview.outputs.tag }}/${PREVIEW_APK_NAME}
          - Rolling latest download: ${GITHUB_SERVER_URL}/${RELEASES_REPO}/releases/download/${{ steps.preview.outputs.latest_tag }}/${PREVIEW_APK_NAME}

          This is a sideloadable preview build, not a production release. By default this workflow creates/updates a dated preview release and also replaces the APK on the rolling \`android-preview-latest\` release.
          EOF

      - name: Publish dated preview pre-release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASES_REPO }}
          token: ${{ secrets.RELEASES_REPO_TOKEN || github.token }}
          tag_name: ${{ steps.preview.outputs.tag }}
          name: MorsVitaEst Android Preview ${{ steps.preview.outputs.date }}
          body_path: preview-output/release-notes.md
          prerelease: true
          overwrite_files: true
          make_latest: false
          files: preview-output/${{ env.PREVIEW_APK_NAME }}
          fail_on_unmatched_files: true

      - name: Publish rolling latest preview pre-release
        if: github.event_name != 'pull_request' && steps.preview.outputs.tag != steps.preview.outputs.latest_tag
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASES_REPO }}
          token: ${{ secrets.RELEASES_REPO_TOKEN || github.token }}
          tag_name: ${{ steps.preview.outputs.latest_tag }}
          name: MorsVitaEst Android Preview Latest (${{ steps.preview.outputs.date }})
          body_path: preview-output/release-notes.md
          prerelease: true
          overwrite_files: true
          make_latest: false
          files: preview-output/${{ env.PREVIEW_APK_NAME }}
          fail_on_unmatched_files: true

      - name: Summarize
        run: |
          {
            echo "### Preview APK ready"
            echo ""
            echo "**Variant:** \`fossDebug\` — open-source flavor, debug build type."
            echo ""
            echo "Download it from the **Artifacts** section of this run, then sideload it onto a device."
            if [ "${{ github.event_name }}" != "pull_request" ]; then
              echo ""
              echo "**Dated pre-release:** https://github.com/${{ env.RELEASES_REPO }}/releases/tag/${{ steps.preview.outputs.tag }}"
              echo "**Dated APK:** https://github.com/${{ env.RELEASES_REPO }}/releases/download/${{ steps.preview.outputs.tag }}/${{ env.PREVIEW_APK_NAME }}"
              echo "**Rolling latest APK:** https://github.com/${{ env.RELEASES_REPO }}/releases/download/${{ steps.preview.outputs.latest_tag }}/${{ env.PREVIEW_APK_NAME }}"
            fi
            echo ""
            echo "> Signed with the repo's shared debug keystore, so it installs over a previous"
            echo "> debug/preview build without wiping app data. This is a debug build, not a release."
          } >> "$GITHUB_STEP_SUMMARY"
