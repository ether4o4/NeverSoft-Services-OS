site_name: MorsVitaEst Documentation
site_url: https://ether4o4.github.io/MorsVitaEst/docs/
site_description: Documentation for MorsVitaEst - AI Assistant App

theme:
  name: material
  palette:
    - scheme: default
      primary: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: red
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.tabs.link

markdown_extensions:
  - tables
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Features:
    - Chat & Conversations: features/chat.md
    - Home & Navigation: features/home.md
    - Compare: features/compare.md
    - Kairos Infrastructure: features/kairos-infrastructure.md
    - Multi-Service: features/multi-service.md
    - Local GGUF: features/gguf-local.md
    - On-Device Inference: features/on-device-inference.md
    - Sandbox: features/sandbox.md
    - Tools: features/tools.md
    - MCP Servers: features/mcp.md
    - Dynamic UI: features/dynamic-ui.md
    - Memories: features/memories.md
    - Heartbeat: features/heartbeat.md
    - Tasks: features/tasks.md
    - Budget: features/budget.md
    - Daemon: features/daemon.md
    - Notifications: features/notifications.md
    - SMS: features/sms.md
    - Reasoning: features/reasoning.md
    - System Prompts: features/system-prompts.md
    - Appearance: features/appearance.md
    - Encryption: features/encryption.md
    - Settings Export & Import: features/settings-export-import.md
